services:
  - type: web
    name: plan-cine-api
    env: php
    plan: free
    region: frankfurt
    buildCommand: >-
      composer install --no-dev --optimize-autoloader &&
      php artisan config:clear &&
      php artisan migrate --force &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: PlanCine
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false            # Genera con: php artisan key:generate --show
      - key: APP_URL
        sync: false            # https://plan-cine-api.onrender.com (tras primer deploy)
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: plan-cine-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: plan-cine-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: plan-cine-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: plan-cine-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: plan-cine-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: database
      - key: FRONTEND_URL
        sync: false            # https://tu-app.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false            # tu-app.vercel.app (sin https://)
      - key: MAIL_FROM_ADDRESS
        value: noreply@plancine.app
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

  # Scheduler: auto-finaliza sesiones y envía notificaciones push al terminar
  - type: cron
    name: plan-cine-scheduler
    env: php
    plan: free
    region: frankfurt
    schedule: "* * * * *"
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan push:send-rating-reminders
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: plan-cine-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: plan-cine-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: plan-cine-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: plan-cine-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: plan-cine-db
          property: password
      - key: LOG_CHANNEL
        value: stderr
      - key: MAIL_FROM_ADDRESS
        value: noreply@plancine.app
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

databases:
  - name: plan-cine-db
    databaseName: plan_cine
    user: plan_cine
    plan: free
    region: frankfurt
