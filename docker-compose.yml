services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plan_cine
      POSTGRES_USER: plan_cine
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plan_cine -d plan_cine"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    # Copy .env.docker → .env so Laravel reads Docker-specific DB_HOST (db, not 127.0.0.1)
    command: >
      sh -c "cp /var/www/html/.env.docker /var/www/html/.env &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan schedule:work &
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BMNapIMxsjt3UddjJo3TcNbSRlDcH2upba5GAE-vfxi7rMcTm3cCDlaMH4t_teVDEg7CdHuqSpdVRqkHIMsHW0s
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata:
